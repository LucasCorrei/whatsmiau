version: '3.8'

# Copie este arquivo para docker-compose.yml e preencha com seus dados:
#   cp docker-compose.example.yml docker-compose.yml

services:
  whatsmiau:
    build: .
    container_name: whatsmiau
    ports:
      - "${PORT:-8081}:8081"
    env_file:
      - .env
    volumes:
      - whatsmeow:/app/data
    depends_on:
      - redis
      - db
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: redis
    volumes:
      - redis-data:/data
    restart: unless-stopped

  db:
    image: postgres:latest
    container_name: postgres
    volumes:
      - pg-data:/pg-data
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-whatsmiau}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-whatsmiau}

volumes:
  redis-data:
    driver: local
  whatsmeow:
    driver: local
  pg-data:
    driver: local
